services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lettercatcher}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lettercatcher}
      POSTGRES_DB: ${POSTGRES_DB:-lettercatcher}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lettercatcher}"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build: .
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lettercatcher}:${POSTGRES_PASSWORD:-lettercatcher}@db:5432/${POSTGRES_DB:-lettercatcher}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
